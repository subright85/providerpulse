name: Collect Provider Status

on:
  # schedule disabled — Cloudflare Worker (isllmdown-cron) triggers via workflow_dispatch
  # schedule:
  #   - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect status data
        run: node scripts/collect.mjs

      - name: Commit if changed
        run: |
          git config user.name "ProviderPulse Bot"
          git config user.email "bot@providerpulse.dev"
          git add public/data/providers.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update provider data [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            sleep 3
          done
          exit 1
