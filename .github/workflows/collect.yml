name: Collect Provider Status

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect status data
        run: node scripts/collect.mjs

      - name: Commit if changed
        run: |
          git config user.name "ProviderPulse Bot"
          git config user.email "bot@providerpulse.dev"
          git add public/data/providers.json
          git diff --cached --quiet || git commit -m "chore: update provider data [skip ci]"
          git push
