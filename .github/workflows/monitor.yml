name: Monitor Provider Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check OpenAI & Anthropic status
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/monitor.mjs

      - name: Commit updated monitor state
        run: |
          git config user.name "ProviderPulse Monitor"
          git config user.email "monitor@providerpulse.dev"
          if git diff --quiet public/data/monitor-state.json 2>/dev/null; then
            echo "No state changes."
            exit 0
          fi
          git add public/data/monitor-state.json
          git commit -m "chore: monitor state update [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            sleep 3
          done
          exit 1
