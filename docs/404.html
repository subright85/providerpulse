<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ProviderPulse</title>
  <script>
    // GitHub Pages SPA fallback. Rewrites the URL into a query string so
    // index.html can restore the original path on load.
    // Pattern from https://github.com/rafgraph/spa-github-pages
    var pathSegmentsToKeep = 1; // /providerpulse
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
